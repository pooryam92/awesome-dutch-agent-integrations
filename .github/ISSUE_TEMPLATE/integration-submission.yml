name: Add an integration
description: Submit a Dutch agent-integration for the index. No JSON knowledge needed.
title: "[Add] <service> — <name>"
labels: ["submission"]
body:
  - type: input
    id: name
    attributes:
      label: Name
      description: The tool's name (leave MCP/skill/Claude etc. as-is).
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Source URL
      description: Canonical repo, vendor page, or package page.
    validations:
      required: true
  - type: input
    id: service
    attributes:
      label: Dutch service
      description: The Dutch service/provider it connects to.
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options: [mcp, skill, plugin, script, managed]
    validations:
      required: true
  - type: input
    id: relationship
    attributes:
      label: Your relationship to it
      description: Author, user, or found it? Helps us verify.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else — provenance, status, caveats.
    validations:
      required: false
