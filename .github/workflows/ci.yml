name: ci
# On PR + merge: validate /data, then ensure README is in sync.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Validate /data against schema.json
        run: npm run validate
      - name: Ensure README.md matches /data
        run: npm run generate -- --check
